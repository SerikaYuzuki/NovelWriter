name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-lint:
    name: Build, Test, and Lint (NovelKit)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ランナーの既定 Xcode がローカル開発環境(Xcode 27)より古いことがある。
      # swift-tools-version 6.0 + swift-testing には Xcode 16 以降が必要なため、
      # ランナー上で利用可能な最新の Xcode を明示的に選択する。
      # 該当パスが存在しない場合でも失敗しないよう、ls でグロブ解決してから選ぶ。
      - name: Select latest available Xcode
        run: |
          set -euo pipefail
          latest_xcode="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [ -n "${latest_xcode:-}" ]; then
            echo "Selecting Xcode: $latest_xcode"
            sudo xcode-select -s "$latest_xcode/Contents/Developer"
          else
            echo "No versioned /Applications/Xcode_*.app found; keeping current xcode-select selection."
          fi
          xcodebuild -version
          swift --version

      - name: swift test (NovelKit)
        working-directory: NovelKit
        run: swift test

      - name: iOS compile check (NovelKit)
        working-directory: NovelKit
        run: |
          xcodebuild build \
            -scheme NovelKit-Package \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Install lint tools
        run: brew install swiftlint swiftformat

      - name: SwiftFormat check
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint
